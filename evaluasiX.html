<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop Sederhana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #dragItem {
            width: 100px;
            height: 100px;
            background-color: royalblue;
            color: white;
            line-height: 100px;
            text-align: center;
            border-radius: 10px;
            cursor: grab;
        }
        #dropZone {
            width: 200px;
            height: 200px;
            border: 2px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <h2>Drag and Drop Sederhana</h2>
    <p>Seret kotak biru ke area yang ditentukan</p>

    <div id="dragItem" draggable="true">Seret Saya</div>
    <div id="dropZone">Letakkan di sini</div>

    <script>
        const dragItem = document.getElementById("dragItem");
        const dropZone = document.getElementById("dropZone");

        // Event saat mulai menyeret
        dragItem.addEventListener("dragstart", (event) => {
            event.dataTransfer.setData("text", event.target.id);
        });

        // Event saat elemen berada di atas area drop
        dropZone.addEventListener("dragover", (event) => {
            event.preventDefault(); // Mencegah perilaku default agar bisa drop
        });

        // Event saat elemen dilepaskan
        dropZone.addEventListener("drop", (event) => {
            event.preventDefault();
            const data = event.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            dropZone.appendChild(draggedElement);
            draggedElement.style.cursor = "default";
            draggedElement.style.backgroundColor = "green";
            draggedElement.innerText = "Berhasil!";
        });
    </script>

</body>
</html>
