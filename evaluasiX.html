<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kegiatan Pembelajaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .drag-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .drop-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .drag-item {
            width: 120px;
            height: 120px;
            cursor: grab;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
            touch-action: none; /* Perbaikan untuk mobile */
            position: relative;
        }
        .drag-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .drop-zone {
            width: 140px;
            height: 50px;
            border: 2px dashed #007bff;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #007bff;
            background-color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .drop-zone:hover {
            background-color: #007bff;
            color: white;
        }
        .drop-zone.correct {
            background-color: #28a745;
            color: white;
            border: 2px solid #28a745;
        }
        #message {
            display: none;
            font-size: 20px;
            font-weight: bold;
            color: #28a745;
            margin-top: 20px;
        }
        .button-container {
            display: none;
            margin-top: 20px;
        }

                @media (max-width: 768px) {
            .drag-item {
                width: 100px; /* Ukuran lebih kecil untuk mobile */
                height: 100px;
            }
            .drop-zone {
                width: 120px; /* Drop zone lebih kecil */
                height: 45px;
                font-size: 14px;
            }
            textarea {
                font-size: 16px;
            }
        }

    </style>
</head>
<body>

<div class="container text-center">
    <h2 class="mt-4">Keberagaman Budaya Bangsa Indonesia</h2>
    <p>Seret gambar adat ke daerah yang sesuai!</p>

    <div class="drag-container" id="drag-container"></div>

    <div class="drop-container">
        <div class="drop-zone" data-answer="Padang">Padang</div>
        <div class="drop-zone" data-answer="Jawa">Jawa</div>
        <div class="drop-zone" data-answer="Papua">Papua</div>
        <div class="drop-zone" data-answer="Bugis">Bugis</div>
        <div class="drop-zone" data-answer="Aceh">Aceh</div>
    </div>

    <div id="message">🎉 Selamat... Kamu Hebat! 🎉</div>

    <div class="button-container" id="button-container">
        <button class="btn btn-danger" onclick="goBack()">Back</button>
        <button class="btn btn-primary" onclick="nextStage()">Next</button>
    </div>

    <div class="container mt-4">
        <h3>Komentar</h3>
        <textarea id="comment" class="form-control" placeholder="Tulis komentar di sini..." rows="3"></textarea>
        <button class="btn btn-primary mt-2" onclick="sendComment()">Kirim Komentar</button>
    
        <h4 class="mt-4">Komentar Sebelumnya:</h4>
        <ul id="comment-list" class="list-group"></ul>
    </div>
    
</div>

<script>
    let correctCount = 0;
    let draggedElement = null;

    const items = [
        { id: "minang", src: "adat minang.png", answer: "Padang" },
        { id: "jawa", src: "adat jawa.png", answer: "Jawa" },
        { id: "papua", src: "adat papua.png", answer: "Papua" },
        { id: "sulawesi", src: "adat sulawesi.png", answer: "Bugis" },
        { id: "aceh", src: "adat aceh.png", answer: "Aceh" }
    ];

    function shuffleArray(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function loadImages() {
        const container = document.getElementById("drag-container");
        container.innerHTML = "";
        let shuffledItems = shuffleArray(items);

        shuffledItems.forEach(item => {
            let div = document.createElement("div");
            div.classList.add("drag-item");
            div.setAttribute("draggable", "true");
            div.setAttribute("id", item.id);
            div.setAttribute("data-answer", item.answer);

            let img = document.createElement("img");
            img.src = item.src;
            img.alt = item.id;

            div.appendChild(img);
            container.appendChild(div);
            console.log("Gambar dimuat:", item.src);

            // Event untuk Desktop
            div.addEventListener("dragstart", (event) => {
               let draggedElement = event.target.closest (".drag-item");
                event.dataTransfer.setData("id", draggedElement.id);
                console.log("Dragging:", draggedElement.id, "Answer:", draggedElement.dataset.answer);
            });

            // Event untuk Mobile
            div.addEventListener("touchstart", (event) => {
                draggedElement = event.target.closest(".drag-item");
            });

            div.addEventListener("touchmove", (event) => {
                event.preventDefault();
                let touch = event.touches[0];
                draggedElement.style.position = "absolute";
                draggedElement.style.left = touch.pageX - 50 + "px";
                draggedElement.style.top = touch.pageY - 50 + "px";
            });

            div.addEventListener("touchend", (event) => {
                let dropZones = document.querySelectorAll(".drop-zone");
                dropZones.forEach(zone => {
                    let rect = zone.getBoundingClientRect();
                    let touch = event.changedTouches[0];

                    if (
                        touch.pageX >= rect.left &&
                        touch.pageX <= rect.right &&
                        touch.pageY >= rect.top &&
                        touch.pageY <= rect.bottom
                    ) {
                        if (draggedElement.dataset.answer === zone.dataset.answer) {
                            zone.classList.add("correct");
                            zone.innerHTML = "✅ " + zone.dataset.answer;
                            draggedElement.parentNode.removeChild(draggedElement);
                            correctCount++;
                            checkWin();
                        } else {
                            alert("Jawaban Salah! Coba lagi!");
                        }
                    }
                });

                // Reset posisi setelah touch end
                draggedElement.style.position = "static";
            });
        });
    }

    document.querySelectorAll(".drop-zone").forEach(zone => {
        zone.addEventListener("dragover", (event) => {
            event.preventDefault();
        });

        zone.addEventListener("drop", (event) => {
            event.preventDefault();
            let draggedId = event.dataTransfer.getData("id");
            let dragged = document.getElementById(draggedId);

            if (dragged && dragged.dataset.answer === zone.dataset.answer) {
                zone.classList.add("correct");
                zone.innerHTML = "✅ " + zone.dataset.answer;
                dragged.parentNode.removeChild(dragged);
                correctCount++;
                checkWin();
            } else {
                alert("Jawaban Salah! Coba lagi!");
            }
        });
    });

    function checkWin() {
        if (correctCount === 5) {
            document.getElementById("message").style.display = "block";
            document.getElementById("button-container").style.display = "block";
        }
    }

    function nextStage() {
        window.location.href = "level2bhinekatunggalikaX.html";
    }

    function goBack() {
        window.history.back();
    }

    window.onload = loadImages;

    
        function sendComment() {
        let commentText = document.getElementById("comment").value;
        if (commentText.trim() === "") {
        alert("Komentar tidak boleh kosong!");
        return;
        }

        let newCommentRef = database.ref("comments").push();
        newCommentRef.set({
        comment: commentText,
        timestamp: Date.now()
        });

        document.getElementById("comment").value = ""; // Reset input
        alert("Komentar terkirim!");
        }

        // Menampilkan komentar dari Firebase
        database.ref("comments").on("child_added", function(snapshot) {
        let commentData = snapshot.val();
        let commentList = document.getElementById("comment-list");
        
        let li = document.createElement("li");
        li.classList.add("list-group-item");
        li.textContent = commentData.comment;
        
        commentList.appendChild(li);
  });

    


    
   
</script>

</body>
</html>
